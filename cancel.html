<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUSHI メ</title>
<link rel="icon" type="image/png" href="./Foto/SushiX_Logo_2.png">

<!-- Шрифты -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0f0f10;
  --card: #161616;
  --accent: #ff2d2d;
  --text: #ffffff;
  --muted: #999;
  --radius: 16px;
}

* { box-sizing: border-box; margin:0; padding:0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: "Montserrat","Noto Sans JP",system-ui,-apple-system,Roboto,"Segoe UI",Arial;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
}

/* Логотип */
.brand {
  position: absolute;
  top: 0px;
  left: 50%;
  transform: translateX(-50%);
  opacity: 0;
  animation: logoFadeIn 1s ease forwards;
  animation-delay: 0.2s;
}

.logo {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 4rem;
  gap: 8px;
  margin: 0;
}

/* Японский символ */
.logo .jp {
  font-family: "Noto Sans JP";
  font-weight: 700;
  font-size: 4.3rem;
  color: #ff0000;
  text-shadow: 0 0 10px rgba(255,0,0,0.4);
}

/* Ссылка */
.logo a {
  text-decoration: none;
  color: inherit;
}

/* hover эффект */
.logo:hover {
  transform: scale(1.05);
  transition: 0.3s;
}

/* Контейнер */
.cancel-container {
  margin-top: 120px;
  background: var(--card);
  padding: 40px 30px;
  border-radius: var(--radius);
  text-align: center;
  max-width: 480px;
  width: 100%;
  box-shadow: 0 20px 50px rgba(0,0,0,0.6);
  animation: fadeIn 0.5s ease;
}

/* Иконка */
.cancel-icon {
  width: 80px;
  height: 80px;
  margin: 0 auto 20px;
  border-radius: 50%;
  background: rgba(255,45,45,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  color: var(--accent);
}

/* Текст */
h1 { margin-bottom: 10px; font-size: 1.6rem; }
p { color: var(--muted); margin-bottom: 30px; line-height: 1.5; }

/* Кнопки */
.button-group {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.btn {
  padding: 14px;
  border-radius: 12px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: 0.2s ease;
}

.btn-secondary {
  background: rgba(255,45,45,0.08);
  color: var(--accent);
}

.btn-secondary:hover {
  background: rgba(255,45,45,0.15);
}

/* Адаптив */
@media (max-width: 480px) {
  .cancel-container { padding: 30px 20px; }
  .logo { font-size: 2.5rem; }
  .logo .jp { font-size: 2.7rem; }
}

/* Анимации */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes logoFadeIn {
  0% { opacity: 0; transform: translateX(-50%) scale(0.8); }
  60% { opacity: 1; transform: translateX(-50%) scale(1.05); }
  100% { opacity: 1; transform: translateX(-50%) scale(1); }
}
</style>
</head>

<body>

<!-- Логотип -->
<div class="brand">
  <h1 class="logo">
    <a href="/" id="logoLink">
      <span>SUSHI</span> <span class="jp">メ</span>
    </a>
  </h1>
</div>

<!-- Контент -->
<div class="cancel-container">
  <div class="cancel-icon">✕</div>
  <h1 id="cancelTitle">Оплата отменена</h1>
  <p id="cancelMessage">Вы отменили оплату заказа.</p>

  <div class="button-group">
    <button class="btn btn-secondary" id="goHomeBtn">Вернуться в меню</button>
  </div>
</div>

<script>
// Читаем язык из URL
const urlParams = new URLSearchParams(window.location.search);
const lang = urlParams.get('lang') || 'ru';

// Переводы
const translations = {
  ru: { title: "Оплата отменена", message: "Вы отменили оплату заказа.", home: "Вернуться в меню" },
  en: { title: "Payment Cancelled", message: "You cancelled your order payment.", home: "Back to Menu" },
  et: { title: "Makse tühistatud", message: "Olete tellimuse makse tühistanud.", home: "Tagasi menüüsse" }
};

// Обновляем тексты
document.getElementById('cancelTitle').textContent = translations[lang].title;
document.getElementById('cancelMessage').textContent = translations[lang].message;
document.getElementById('goHomeBtn').textContent = translations[lang].home;

// Ссылки на меню
const menuUrls = {
  ru: "https://sushix0.github.io/SUSHI-X/ru",
  en: "https://sushix0.github.io/SUSHI-X/en",
  et: "https://sushix0.github.io/SUSHI-X"
};

// Кнопка “назад в меню”
document.getElementById('goHomeBtn').addEventListener('click', () => {
  window.location.href = menuUrls[lang] || menuUrls['ru'];
});

// Логотип → ссылка на соответствующий язык
document.getElementById('logoLink').href = menuUrls[lang] || menuUrls['ru'];
</script>

</body>
</html>
